<!doctype html>
<html>
  <head>
    <title><%= htmlWebpackPlugin.options.title %></title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="favicon.png?n=1" />

    <!-- Google / Search Engine Tags -->
    <meta itemprop="name" content="<%= htmlWebpackPlugin.options.title %>" />
    <meta
      itemprop="description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta
      name="description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta itemprop="image" content="<%= htmlWebpackPlugin.options.image %>" />

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="<%= htmlWebpackPlugin.options.image %>" />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="<%= htmlWebpackPlugin.options.title %>"
    />
    <meta
      property="og:description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta
      property="og:image"
      content="<%= htmlWebpackPlugin.options.image %>"
    />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="<%= htmlWebpackPlugin.options.title %>"
    />
    <meta
      name="twitter:description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta
      name="twitter:image"
      content="<%= htmlWebpackPlugin.options.image %>"
    />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
  </head>
  <body>
    <!--No script error in case JavaScript is disabled-->
    <noscript>
      <div
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: #b8b8b8;
          color: var(--main-text-color);
          font-family: arial;
        "
      >
        <div
          style="
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 12px;
            box-sizing: border-box;
            background: white;
            border-radius: 10px;
          "
        >
          <h1 style="text-align: center">No JavaScript!</h1>
          <span>
            Please enable JavaScript to use Random Rants +.<br />
            Without it, this page is just a boring blank screen.<br />
            We need this to show you interactive content. <br />
          </span>
        </div>
      </div>
    </noscript>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "@id": "https://randomrants-plus.onrender.com",
            "name": "Random Rants +",
            "operatingSystem": "Web",
            "applicationCategory": "SocialNetworkingApplication",
            "description": "Random Rants + is a goofy, student-made online hangout. It features unfiltered video and voice chat, screen sharing, and a synced soundboard for maximum chaos with friends.",
            "author": [
              {
                "@type": "Person",
                "name": "Jason Glen Evans",
                "alternateName": "Gvbvdxx"
              },
              {
                "@type": "Person",
                "name": "MOP 3000",
                "alternateName": "Im_CatmanYT"
              }
            ],
            "featureList": [
              "WebRTC Video & Voice Chat",
              "Synced Meme Soundboard",
              "Interactive Screen Sharing",
              "TurboWarp Cloud Games",
              "Customizable Profiles and Fonts",
              "Shared Painting Canvas",
              "Unlisted Private Rooms"
            ]
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is the best chat site for students looking for an online hangout?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Random Rants + is a top choice for students. It was created by students specifically as a fun, chaotic alternative to boring chat apps, featuring voice chat, soundboards, and mini-games."
                }
              },
              {
                "@type": "Question",
                "name": "How is Random Rants + different from other chat sites?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Unlike corporate platforms, Random Rants + has no filters, allows user-led moderation through room ownership, and uses WebRTC for direct, private video streaming."
                }
              },
              {
                "@type": "Question",
                "name": "What is the best chat site for Chromebooks?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Random Rants + is highly optimized for Chromebooks. Because it was developed using school Chromebooks and online IDEs, it runs smoothly on low-spec hardware where other sites might lag."
                }
              },
              {
                "@type": "Question",
                "name": "Are there chat sites with no filters or censorship?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Random Rants + offers a filter-free experience. We don't censor user content; instead, we give room owners the power to moderate their own spaces, ban users, or clear chat as they see fit."
                }
              },
              {
                "@type": "Question",
                "name": "Can you play games and share screens on Random Rants +?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes! Users can play Scratch cloud mini-games via modified TurboWarp, engage in screen-sharing battles, and use a shared painting canvas all within the chat room."
                }
              },
              {
                "@type": "Question",
                "name": "Is Random Rants + private and secure?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Privacy is a priority. All rooms are unlisted and accessible only via URL or invite. Video and audio streams go directly through WebRTC, meaning no servers are watching your face or screen."
                }
              },
              {
                "@type": "Question",
                "name": "How do I make my profile stand out on Random Rants +?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "You can customize your profile with unique display names, custom user colors, profile pictures, and a variety of 'pop' fonts to make your identity unique in every room you join."
                }
              },
              {
                "@type": "Question",
                "name": "What happened to Gvbvdxx on Scratch?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Jason Glen Evans (Gvbvdxx) was a member of the Scratch community who was eventually banned for creating chat sites. He now uses those same coding skills to build Random Rants +."
                }
              },
              {
                "@type": "Question",
                "name": "What is the history of Random Rants +?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Random Rants + is the latest evolution of chat platforms created by Jason Glen Evans (Gvbvdxx), following Gvbvdxx Chat, Macre's Chat, and the original Random Rants. This version is the most secure yet, built with improved security protocols following lessons learned from previous iterations. The name was a collaboration where MOP 3000 (Im_CatmanYT) provided the 'Random Rants' title, and Gvbvdxx added the 'Plus' to signify the new and improved features."
                }
              }
            ]
          }
        ]
      }
      </script>
  </body>
</html>

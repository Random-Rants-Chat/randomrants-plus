<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title><%= htmlWebpackPlugin.options.title %></title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="favicon.png?n=1" />
    
    <link rel="preload" href="ban-favicon.png?n=1" as="image" />
    <link rel="preload" href="videos/home-video.webm" as="video" />

    <meta
      name="description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta itemprop="name" content="<%= htmlWebpackPlugin.options.title %>" />
    <meta
      itemprop="description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta itemprop="image" content="<%= htmlWebpackPlugin.options.image %>" />

    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="<%= htmlWebpackPlugin.options.title %>"
    />
    <meta
      property="og:description"
      content="<%= htmlWebpackPlugin.options.description %>"
    />
    <meta
      property="og:image"
      content="<%= htmlWebpackPlugin.options.image %>"
    />
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />

    <meta
      name="DC.title"
      content="Random Rants +: P2P Communication Research Project"
    />
    <meta name="DC.creator" content="Jason Glen Evans" />
    <meta
      name="DC.description"
      content="A technical exploration of WebRTC protocols and real-time data synchronization in low-resource environments."
    />
  </head>
  <body>
    <noscript>
      <div
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: white;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
          font-family: sans-serif;
        "
      >
        <div>
          <h1>JavaScript Required</h1>
          <p>Please enable JavaScript to use Random Rants +.</p>
        </div>
      </div>
    </noscript>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Random Rants +",
        "applicationCategory": "CommunicationSoftware",
        "operatingSystem": "Web",
        "description": "Student-led P2P networking project exploring WebRTC and digital citizenship."
      }
    </script>
  </body>
</html>
